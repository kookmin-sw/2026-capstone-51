server:
  servlet:
    context-path: /api
  forward-headers-strategy: framework

spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    show-sql: true
    open-in-view: true

app:
  jwt:
    key: ${JWT_SECRET_KEY}
    token-expiration: 24
    refresh-expiration: 720
  cors:
    allowed-origins:
      - http://localhost:3000
  embedding:
    model-id: ${EMBEDDING_MODEL_ID:amazon.titan-embed-text-v2:0}
  llm:
    model-id: ${LLM_MODEL_ID:us.anthropic.claude-sonnet-4-5-20250929-v1:0}
    max-tokens: ${LLM_MAX_TOKENS:4096}
    temperature: ${LLM_TEMPERATURE:0.7}

aws:
  region: us-east-1
  sqs:
    star-embedding-queue-url: ${SQS_STAR_EMBEDDING_QUEUE_URL}
  s3:
    bucket: ${S3_BUCKET:pj-kmucd1-01-s3}
    region: ${S3_REGION:us-east-1}
    upload-url-expiration-minutes: 5
    download-url-expiration-minutes: 5

google:
  client:
    id: ${GOOGLE_CLIENT_ID}
    secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI}

